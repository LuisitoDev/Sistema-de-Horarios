<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="shortcut icon" href="../assets/Logo-FCFM.ico" type="image/x-icon">
    <link rel="stylesheet" href="/front/css/main.css">
    <title>Alumnos solicitudes</title>
</head>
<body class="main-background"   >
  <div class="min-vh-100 container-fluid">
   <header class="row position-fixed w-100" style="margin-bottom: 150px; z-index: 10;" >
    <nav class="navbar navbar-expand-lg button-color col-lg-12 d-none d-lg-block">
         
          <a class="navbar-brand text-white" href="#">Registro FCFM</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon  text-white "></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active text-white " aria-current="page" href="#">Inicio</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-white " href="#">Solicitudes</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-white " href="#">Cerrar sesión</a>
              </li>
            </ul>
            <span class="navbar-text text-white ">
              Hola, Derek!
            </span>
          </div>
        
      </nav>
   </header>

    <main class="row mx-2 mb-md-5 pt-lg-5" >
        <div class="col-12 col-lg-8 container p-0 mt-lg-4">
            <h1 class="text-center my-5 display-4  ">Horario</h1>
            <div class="d-flex align-items-center mb-5">
                <img src="../assets/147144.png"  style="height: 100px; width: 100px;" alt="">
                 <h3 class="ms-3 fs-2" >Derek Jafet Cortes Madriz</h3>   
            </div>
            <div class="d-md-flex justify-content-between align-items-center  mb-5">
                <div class="d-flex justify-content-center align-items-center mb-5 mb-md-0">

                
                <select name="horario" class="p-1 ss-btn text-white ">
                    <option value="Martes-Jueves">Martes-Jueves</option>
                    <option value="Completo">Completo</option>

                    <option value="Lunes-Miercoles-Viernes">Lunes-Miercoles-Viernes</option>
                    <option value="Personalizado">Personalizado</option>

                </select>
            </div>
                <div class="text-center">

              
                <button class="btn btn-primary ss-btn w-100">Guardar</button>
            </div>
            </div>
            <div class="d-md-flex justify-content-between mb-5" role="group" aria-label="Basic checkbox toggle button group">
                <div class="mb-2">


                <input type="checkbox" class="btn-check" id="btncheck1" autocomplete="off">
                <label class="btn btn-outline-primary btn-lg w-100" for="btncheck1">Lunes</label>
                </div>
            <div class="mb-2">


                <input type="checkbox" class="btn-check" id="btncheck2" autocomplete="off">
                <label class="btn btn-outline-primary btn-lg w-100" for="btncheck2">Martes</label>
            </div>
            <div class="mb-2">


                <input type="checkbox" class="btn-check" id="btncheck3" autocomplete="off">
                <label class="btn btn-outline-primary btn-lg w-100" for="btncheck3">Miercoles</label>
            </div>
            <div class="mb-2">


                <input type="checkbox" class="btn-check" id="btncheck4" autocomplete="off">
                <label class="btn btn-outline-primary btn-lg w-100" for="btncheck4">Jueves</label>
            </div>
            <div class="mb-2">


                <input type="checkbox" class="btn-check" id="btncheck5" autocomplete="off">
                <label class="btn btn-outline-primary btn-lg w-100" for="btncheck5">Viernes</label>
            </div>
              </div>

              
        </div>
    </main>
   </div>
   <div class="container-fluid">
     <footer class="row position-fixed bottom-0 w-100 d-lg-none"  id="mobileFooter">
      <a class="col-4 d-flex justify-content-center align-items-center button-color" style="height:75px"><h1 ><i class="text-white fs-1 fa-solid fa-arrow-right-from-bracket"></i></h1></a>
      <a class="col-4 d-flex justify-content-center align-items-center button-color" style="height:75px"><h1><i class="text-white fa-solid fa-user-large"></i></h1></a>
      <a class="col-4 d-flex justify-content-center align-items-center button-color" style="height:75px"><h1><i class="text-white fa-solid fa-envelope"></i></h1></a>
  
      </footer>
      
      <footer class="d-none d-lg-block">       
        <div class="row">
          <div class="col-12 button-color d-flex justify-content-center align-items-center" style="height:80px">
              <h5 class="text-white text-center pt-3">Departamento de asesorias FCFM 2022  &copy</h5>
          </div>   
        </div>
      </footer>
   </div>
