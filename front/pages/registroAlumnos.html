<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
      integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="shortcut icon" href="../assets/Logo-FCFM.ico" type="image/x-icon">
    <link rel="stylesheet" href="/front/css/main.css">
    <link rel="stylesheet" href="/front/css/registroAlumnos.css" />
    <title>Registro Alumno</title>
  </head>

  <body class="main-background">
    <header></header>
    <main class="container-fluid min-vh-100">
      <div class="row justify-content-center">
        <div class="col col-md-10 col-xl-7 p-0">
          <h4 class="text-center h2 my-5 display-3">Registro</h4>
  
          <div class="mb-3 d-flex">
            <div class="container">
              <form action="#" id="registro">
                <label for="text" class="form-label fw-bold ms-5">Matricula:</label>
                <div class="input-group mb-3">
                  <span class="input-group-text bg-transparent border-0" id="basic-addon1"
                    ><i class="fa-solid fs-3 fa-hashtag"></i
                  ></span>
                  <input
                    type="text"
                    class="form-control rounded-2"
                    name="matricula"
                    placeholder="Matricula"
                    required
                    input-field
                  />
                </div>
  
                <label for="text" class="form-label fw-bold ms-5">Nombre completo:</label>
                <div class="input-group mb-3">
                  <span class="input-group-text bg-transparent border-0" id="basic-addon1"
                    ><i class="fa-solid fs-3 fa-user"></i
                  ></span>
                  <input
                    type="text"
                    class="form-control rounded-2"
                    name="nombre"
                    placeholder="Nombre"
                    required
                  />
                </div>
  
                <label for="text" class="form-label fw-bold ms-5">Correo universitario:</label>
                <div class="input-group mb-3">
                  <span class="input-group-text bg-transparent border-0" id="basic-addon1"
                    ><i class="fa-solid fs-3 fa-envelope"></i
                  ></span>
                  <input
                    type="text"
                    class="form-control rounded-2"
                    name="correo"
                    placeholder="Correo@uanl.edu.mx"
                    required
                  />
                </div>
  
                <label for="text" class="form-label fw-bold ms-5 ">Carrera:</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-0" id="basic-addon1"
                  ><i class="fa-solid fs-3 fa-landmark"></i></span>
                  <select name="carrera" class="form-select rounded-2">
                    <option value="1">LMAD</option>
                    <option value="2">LCC</option>
                    <option value="3">LSTI</option>
                    <option value="4">LA</option>
                    <option value="5">LM</option>
                    <option value="6">LF</option>
                  </select>
                </div>
                <br>
                <label for="text" class="form-label fw-bold ms-5">Programa:</label>
                <div class="input-group mb-3">
                  <span class="input-group-text bg-transparent border-0" id="basic-addon1"
                  ><i class="fa-solid fs-3 fa-paste"></i></span>
                  <select name="programa" class="form-select rounded-2">
                    <option value="1">Asesorias</option>
                    <option value="2">Videos</option>
                    <option value="3">Programa de horarios</option>
                  </select>
                </div>
                <br>
                <div class="d-flex justify-content-center mb-4">
                  <button
                    class="btn button-color text-white fs-5 px-4 py-2"
                    type="submit"
                  >
                    Registrar
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div class="box-blue__background container-fluid">
        <div class="row justify-content-between align-items-center py-3 px-1">
          <div class="col-9 text-white">
            <span class="fs-4">Departamento de asesorías</span>
          </div>
          <div class="col-3 col-sm-2 col-lg-1"><img src="../assets/Logo-FCFM.ico" class="img-fluid" alt=""></div>
        </div>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
